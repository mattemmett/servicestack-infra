services:
  hello:
    image: nginxdemos/hello:plain-text
    restart: unless-stopped
    expose:
      - "80"

  edge:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - hello
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
